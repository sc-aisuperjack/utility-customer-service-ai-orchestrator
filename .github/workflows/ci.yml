name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Tests and evals
    runs-on: ubuntu-latest

    env:
      MODEL_PROVIDER: local
      PROMPT_VERSION: utility_assistant_v1
      AWS_REGION: us-east-1
      BEDROCK_MODEL_ID: example-model-id
      TEMPERATURE: "0.1"
      MAX_TOKENS: "300"
      MAX_RETRIEVED_DOCS: "4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Public safety scan
        run: |
          python scripts/check_public_safety.py

      - name: Run tests
        run: |
          python -m pytest

      - name: Run golden evals
        run: |
          python -m evals.run_evals

      - name: Run journey report
        run: |
          python scripts/journey_report.py

      - name: Compare prompt versions
        run: |
          python scripts/compare_prompt_versions.py

      - name: Run Lex/Lambda simulation
        run: |
          python scripts/simulate_lex_high_bill.py
